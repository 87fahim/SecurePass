<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>
<link rel="stylesheet" href="newLinks.css">
</head>

<body>

<div class="container">

<aside id="links-panel">
<h3 class="panel-title">Categories</h3>
<div id="category-list"></div>
</aside>

<div class="content-container">

<div class="page-header">
<h2 id="category-title">Common Links</h2>

<div class="theme-switcher" aria-label="Theme selector">
<button type="button" class="theme-btn" data-theme="teal" title="Teal (current)">Teal</button>
<button type="button" class="theme-btn" data-theme="bw" title="Black & White">B/W</button>
<button type="button" class="theme-btn" data-theme="wb" title="White & Black">W/B</button>
<button type="button" class="theme-btn" data-theme="blue" title="Blue & White">Blue</button>
</div>
</div>

<div class="app-box">

<main id="important-links">

<div id="title-bar">

<div class="search-wrapper">
<input type="text" id="search" placeholder="Search selected category...">
<button type="button" id="clear-search" aria-label="Clear search" title="Clear">×</button>
</div>

<hr class="search-divider">

</div>

<section id="pinned-section" class="pinned-section hidden" aria-label="Pinned links">
<div class="pinned-container"></div>
<hr class="pinned-divider">
</section>

<div class="link-container"></div>

</main>

</div>

</div>
</div>

<footer>
<div class="footer-credit">Muhamad Fahim</div>
</footer>

<script src="newLink-data.js"></script>
<script src="newLinks.js"></script>

</body>
</html>
